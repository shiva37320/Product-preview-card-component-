<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product preview card component</title>
  
  <style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
</style>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">
    <div class="image-container">
      <img src="image-product-mobile.jpg" alt="Product-Image" class="mobile-img">
      <img src="image-product-desktop.jpg" alt="Product-Image" class="desktop-img">
    </div>

    <div class="text-container">
      <p class="first">P E R F U M E</p>
      <h2 class="second">Gabrielle Essence Eau De Parfum</h2>
      <p class="third"> A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>
      <div class="price">
        <h2 class="fourth">$149.99</h2>
        <p class="fifth">$169.99</p>
      </div>
      <div class="button">
        <button type="submit">
          <img src="icon-cart.svg" alt="Cart-icon" class="icon">
          Add to Cart
        </button>
      </div>

    </div>
  </div>

</body>

</html>
